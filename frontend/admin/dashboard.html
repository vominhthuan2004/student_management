<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* style giống như đã có */
  </style>
</head>
<body>
<div class="container-fluid p-0">
  <div class="row g-0">
    <div class="col-md-3 col-lg-2 sidebar">
      <h4 class="text-center mb-4 mt-2">👑 Admin Portal</h4>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="#" data-page="students">
            <i class="bi bi-people me-2"></i> Sinh viên
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="classes">
            <i class="bi bi-building me-2"></i> Lớp học
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="teachers">
            <i class="bi bi-person-badge me-2"></i> Giáo viên
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="schedule">
            <i class="bi bi-calendar-week me-2"></i> Thời khóa biểu
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-page="exams">
            <i class="bi bi-pencil-square me-2"></i> Lịch thi
          </a>
        </li>
        <li class="nav-item mt-4">
          <a class="nav-link text-danger" href="#" onclick="logout()">
            <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
          </a>
        </li>
      </ul>
    </div>

    <div class="col-md-9 col-lg-10 content">
      <div class="info-bar d-flex justify-content-between align-items-center">
        <span id="adminInfo" class="fw-bold fs-5 text-primary">Xin chào, Admin</span>
        <span class="text-muted small">Hệ thống quản lý</span>
      </div>
      <div id="mainContent">
        <!-- Nội dung động -->
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>

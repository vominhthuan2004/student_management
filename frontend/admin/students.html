<!DOCTYPE html>
<html>

<head>
    <title>Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/students.js"></script>

</head>

<body class="container mt-4">

    <h2>Students</h2>

    <div class="row mb-3">

        <div class="col">
            <input id="studentCode" class="form-control" placeholder="Student Code">
        </div>

        <div class="col">
            <input id="fullName" class="form-control" placeholder="Full Name">
        </div>

        <div class="col">
            <input id="email" class="form-control" placeholder="Email">
        </div>

        <div class="col">
            <input id="phone" class="form-control" placeholder="Phone">
        </div>

        <div class="col">
            <input id="classId" class="form-control" placeholder="Class ID">
        </div>

        <div class="col">
            <button onclick="createStudent()" class="btn btn-primary">
                Add Student
            </button>
        </div>

    </div>

    <div class="col">
        <button onclick="createStudent()" class="btn btn-primary">
            Add Student
        </button>
    </div>

    </div>

    <table class="table table-bordered">

        <thead>

            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Class</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody id="studentTable">

        </tbody>

    </table>

</body>

</html>

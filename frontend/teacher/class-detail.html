<!-- frontend/teacher/class-detail.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết lớp học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 id="className"></h2>
        <p>Mã lớp: <span id="classCode"></span></p>
        <a href="classes.html" class="btn btn-secondary mb-3">← Quay lại</a>

        <!-- Tab điểm danh -->
        <ul class="nav nav-tabs" id="attendanceTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="manual-tab" data-bs-toggle="tab" data-bs-target="#manual" type="button">Điểm danh thủ công</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="code-tab" data-bs-toggle="tab" data-bs-target="#code" type="button">Tạo mã / QR</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button">Lịch sử điểm danh</button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <!-- Tab thủ công -->
            <div class="tab-pane fade show active" id="manual">
                <div class="mb-3">
                    <label for="attendanceDate" class="form-label">Chọn ngày:</label>
                    <input type="date" id="attendanceDate" class="form-control w-auto">
                </div>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã SV</th>
                            <th>Họ tên</th>
                            <th>Điểm danh</th>
                        </tr>
                    </thead>
                    <tbody id="studentList"></tbody>
                </table>
                <button class="btn btn-success" onclick="submitManualAttendance()">Lưu điểm danh</button>
            </div>

            <!-- Tab tạo mã -->
            <div class="tab-pane fade" id="code">
                <div class="card">
                    <div class="card-body">
                        <h5>Tạo mã điểm danh</h5>
                        <div class="mb-3">
                            <label for="expiryMinutes" class="form-label">Thời hạn (phút):</label>
                            <input type="number" id="expiryMinutes" class="form-control w-auto" value="5" min="1" max="60">
                        </div>
                        <button class="btn btn-primary" onclick="generateCode()">Tạo mã</button>
                        <div id="generatedCode" class="mt-3" style="display:none;">
                            <p>Mã điểm danh: <strong id="codeDisplay"></strong></p>
                            <div id="qrCode"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab lịch sử -->
            <div class="tab-pane fade" id="history">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Sinh viên</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="historyList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="../js/teacher.js"></script>
    <script src="../js/class-detail.js"></script>
</body>
</html>

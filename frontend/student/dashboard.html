<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow p-4">
    <h3 class="mb-3">👨‍🎓 Student Dashboard</h3>

    <p id="studentName" class="fw-bold text-primary"></p>

    <!-- Nhập code -->
    <div class="input-group mb-3">
      <input id="attendanceCode" class="form-control" placeholder="Nhập mã điểm danh">
      <button class="btn btn-success" onclick="checkIn()">Điểm danh</button>
    </div>

  </div>

  <!-- Lịch sử -->
  <div class="card shadow p-4 mt-4">
    <h4>📅 Lịch sử điểm danh</h4>

    <table class="table table-bordered mt-3">
      <thead class="table-dark">
        <tr>
          <th>Ngày</th>
          <th>Trạng thái</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

</div>

<script src="../js/student.js"></script>

</body>
</html>
